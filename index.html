<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Ponto & Banco de Horas</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <!-- TELA DE LOGIN -->
    <div id="tela-login" class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold text-gray-800 text-center mb-6">Ponto Online - Login</h1>
        <form id="form-login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">E-mail</label>
                <input type="email" id="login-email" required class="mt-1 block w-full rounded-md border border-gray-300 p-2 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Senha</label>
                <input type="password" id="login-senha" required class="mt-1 block w-full rounded-md border border-gray-300 p-2 shadow-sm focus:border-blue-500 focus:ring-blue-500">
            </div>
            <button type="submit" class="w-full p-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition-all shadow">Entrar</button>
        </form>
    </div>

    <!-- PAINEL DO FUNCIONÁRIO -->
    <div id="painel-funcionario" class="hidden bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold text-gray-800">Olá, <span id="nome-user">...</span></h1>
            <button onclick="fazerLogout()" class="text-sm text-red-600 hover:underline">Sair</button>
        </div>
        
        <div class="text-center mb-6">
            <p id="txt-data" class="text-sm text-gray-500 font-medium uppercase"></p>
            <p id="txt-relogio" class="text-4xl font-black text-blue-600 tracking-wider">00:00:00</p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <button onclick="baterPonto('entrada')" class="p-3 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-lg shadow">Entrada</button>
            <button onclick="baterPonto('saidaAlmoco')" class="p-3 bg-yellow-600 hover:bg-yellow-700 text-white font-semibold rounded-lg shadow">Saída Almoço</button>
            <button onclick="baterPonto('voltaAlmoco')" class="p-3 bg-orange-600 hover:bg-orange-700 text-white font-semibold rounded-lg shadow">Volta Almoço</button>
            <button onclick="baterPonto('saida')" class="p-3 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg shadow">Saída</button>
        </div>

        <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
            <div class="flex justify-between items-center">
                <span class="text-gray-700 font-medium">Seu Banco de Horas:</span>
                <span id="saldo-banco" class="text-lg font-bold text-gray-900">Calculando...</span>
            </div>
        </div>
    </div>

    <!-- PAINEL DO ADMINISTRADOR -->
    <div id="painel-admin" class="hidden bg-white p-8 rounded-xl shadow-lg w-full max-w-3xl">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Painel Administrativo</h1>
            <button onclick="fazerLogout()" class="text-sm text-red-600 hover:underline">Sair</button>
        </div>

        <!-- Formulário para Cadastrar Novo Funcionário -->
        <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 mb-8">
            <h2 class="text-sm font-semibold text-gray-700 uppercase mb-3">Cadastrar Novo Funcionário</h2>
            <form id="form-cadastro" class="grid grid-cols-1 md:grid-cols-4 gap-3">
                <input type="text" id="cad-nome" placeholder="Nome Completo" required class="p-2 border rounded bg-white">
                <input type="email" id="cad-email" placeholder="E-mail" required class="p-2 border rounded bg-white">
                <input type="password" id="cad-senha" placeholder="Senha Provisória" required class="p-2 border rounded bg-white">
                <button type="submit" class="p-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded">Cadastrar</button>
            </form>
        </div>

       <!-- Lista de Funcionários e Saldos Detalhados -->
        <h2 class="text-lg font-semibold text-gray-700 mb-3">Espelho de Ponto (Hoje)</h2>
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Funcionário</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Entrada</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">S. Almoço</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">V. Almoço</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Saída</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Saldo Geral</th>
                    </tr>
                </thead>
                <tbody id="tabela-funcionarios" class="bg-white divide-y divide-gray-200">
                    <!-- Gerado dinamicamente via JS -->
                </tbody>
            </table>
        </div>

    <!-- Firebase Core e Módulos -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

   const firebaseConfig = {
  apiKey: "AIzaSyBYKUhUGfBei3zfIv5YOJ3Ck_uKfr3xETw",
  authDomain: "ponto-online-eb0c0.firebaseapp.com",
  projectId: "ponto-online-eb0c0",
  storageBucket: "ponto-online-eb0c0.firebasestorage.app",
  messagingSenderId: "335533764452",
  appId: "1:335533764452:web:2bb464c01df329b8c0d471"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const JORNADA_DIARIA = 480; // 8 horas em minutos
        let usuarioLogado = null;

        // Relógio em Tempo Real
        setInterval(() => {
            const agora = new Date();
            const relogio = document.getElementById('txt-relogio');
            const dataTxt = document.getElementById('txt-data');
            if(relogio) relogio.innerText = agora.toLocaleTimeString('pt-BR');
            if(dataTxt) dataTxt.innerText = agora.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
        }, 1000);

        // Monitorar Status de Autenticação (Saber quem está logado)
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                usuarioLogado = user;
                const docSnap = await getDoc(doc(db, "usuarios", user.uid));
                
                if (docSnap.exists()) {
                    const dadosPerfil = docSnap.data();
                    document.getElementById('tela-login').classList.add('hidden');
                    
                    if (dadosPerfil.role === 'admin') {
                        document.getElementById('painel-admin').classList.remove('hidden');
                        carregarRelatorioAdmin();
                    } else {
                        document.getElementById('painel-funcionario').classList.remove('hidden');
                        document.getElementById('nome-user').innerText = dadosPerfil.nome;
                        atualizarBancoHorasFuncionario(user.uid);
                    }
                }
            } else {
                // Se deslogar, reseta as telas
                document.getElementById('tela-login').classList.remove('hidden');
                document.getElementById('painel-funcionario').classList.add('hidden');
                document.getElementById('painel-admin').classList.add('hidden');
                usuarioLogado = null;
            }
        });

        // Ação de Login
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const senha = document.getElementById('login-senha').value;
            try {
                await signInWithEmailAndPassword(auth, email, senha);
            } catch (error) {
                alert("Erro ao fazer login: Verifique e-mail e senha.");
            }
        });

        // Ação de Logout
        window.fazerLogout = () => {
            signOut(auth);
        };

        // Bater o Ponto (Funcionário)
        window.baterPonto = async (tipo) => {
            if (!usuarioLogado) return;
            const agora = new Date();
            const dataIso = agora.toISOString().split('T')[0];
            const horaAtual = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            
            const docRef = doc(db, "pontos", `${usuarioLogado.uid}_${dataIso}`);
            const docSnap = await getDoc(docRef);
            
            let dadosPonto = { data: dataIso, uid: usuarioLogado.uid };
            if (docSnap.exists()) dadosPonto = docSnap.data();

            dadosPonto[tipo] = horaAtual;

            if (dadosPonto.entrada && dadosPonto.saidaAlmoco && dadosPonto.voltaAlmoco && dadosPonto.saida) {
                dadosPonto.horasTrabalhadas = (converterParaMinutos(dadosPonto.saidaAlmoco) - converterParaMinutos(dadosPonto.entrada)) + 
                                              (converterParaMinutos(dadosPonto.saida) - converterParaMinutos(dadosPonto.voltaAlmoco));
                dadosPonto.saldoDia = dadosPonto.horasTrabalhadas - JORNADA_DIARIA;
            }

            await setDoc(docRef, dadosPonto, { merge: true });
            alert(`Ponto registrado (${tipo}) às ${horaAtual}!`);
            atualizarBancoHorasFuncionario(usuarioLogado.uid);
        };

        // Cadastrar Novo Funcionário (Admin)
        document.getElementById('form-cadastro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('cad-nome').value;
            const email = document.getElementById('cad-email').value;
            const senha = document.getElementById('cad-senha').value;

            try {
                // Cria temporariamente a conta no Auth do Firebase
                const resultado = await createUserWithEmailAndPassword(auth, email, senha);
                
                // Salva o perfil do usuário no Firestore como funcionário
                await setDoc(doc(db, "usuarios", resultado.user.uid), {
                    nome: nome,
                    email: email,
                    role: "funcionario"
                });

                alert(`Funcionário ${nome} cadastrado com sucesso!`);
                document.getElementById('form-cadastro').reset();
                carregarRelatorioAdmin();
            } catch (error) {
                alert("Erro ao cadastrar funcionário: " + error.message);
            }
        });

        // Auxiliares de Cálculo de Horas
        function converterParaMinutos(horaStr) {
            const [h, m] = horaStr.split(':').map(Number);
            return (h * 60) + m;
        }

        function formatarMinutosParaTexto(totalMinutos) {
            const sinal = totalMinutos >= 0 ? "+" : "-";
            const horas = Math.floor(Math.abs(totalMinutos) / 60);
            const minutos = Math.abs(totalMinutos) % 60;
            return `${sinal}${horas}h ${minutos}m`;
        }

        // Atualiza a View de Saldo do Funcionário logado
        async function atualizarBancoHorasFuncionario(uid) {
            const q = query(collection(db, "pontos"), where("uid", "==", uid));
            const querySnapshot = await getDocs(q);
            let saldoTotal = 0;

            querySnapshot.forEach((doc) => {
                if (doc.data().saldoDia !== undefined) saldoTotal += doc.data().saldoDia;
            });

            const elemento = document.getElementById('saldo-banco');
            elemento.innerText = formatarMinutosParaTexto(saldoTotal);
            elemento.className = saldoTotal >= 0 ? "text-lg font-bold text-green-600" : "text-lg font-bold text-red-600";
        }

        // Carrega Relatório Geral (Admin)
        async function carregarRelatorioAdmin() {
            const tabela = document.getElementById('tabela-funcionarios');
            tabela.innerHTML = ""; // Limpa a tabela

            // Busca todos os funcionários
            const qUsuarios = query(collection(db, "usuarios"), where("role", "==", "funcionario"));
            const usuariosSnapshot = await getDocs(qUsuarios);

            // Busca todos os pontos salvos
            const pontosSnapshot = await getDocs(collection(db, "pontos"));
            const listaPontos = [];
            pontosSnapshot.forEach(d => listaPontos.push(d.data()));

            usuariosSnapshot.forEach((userDoc) => {
                const dadosUser = userDoc.data();
                const uidUser = userDoc.id;

                // Soma o saldo apenas desse funcionário específico
                let saldoAcumulado = 0;
                listaPontos.filter(p => p.uid === uidUser).forEach(p => {
                    if (p.saldoDia !== undefined) saldoAcumulado += p.saldoDia;
                });

                const corClasse = saldoAcumulado >= 0 ? "text-green-600 font-bold" : "text-red-600 font-bold";

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${dadosUser.nome}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${dadosUser.email}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm ${corClasse}">${formatarMinutosParaTexto(saldoAcumulado)}</td>
                `;
                tabela.appendChild(tr);
            });
        }
    </script>
</body>
</html>
